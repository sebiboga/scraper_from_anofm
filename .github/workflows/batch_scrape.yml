name: Batch Scrape

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of companies to scrape'
        required: false
        default: '575'
        type: string
  schedule:
    - cron: '0 * * * *'

jobs:
  trigger-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger cleanup workflow
        run: |
          gh workflow run cleanup.yml --repo sebiboga/scraper_from_anofm || true
          echo "Cleanup workflow triggered"

      - name: Check and reset for new day
        run: |
          TODAY=$(date +%Y-%m-%d)
          if [ -f last_date.json ]; then
            LAST_DATE=$(cat last_date.json)
            if [ "$LAST_DATE" != "$TODAY" ]; then
              echo "[]" > scraped_today.json
              echo "$TODAY" > last_date.json
              echo "New day detected ($TODAY), reset progress"
            fi
          else
            echo "[]" > scraped_today.json
            echo "$TODAY" > last_date.json
          fi

      - name: Get current progress
        id: progress
        run: |
          INDEX=$(node -e "console.log(JSON.parse(require('fs').readFileSync('scraped_today.json', 'utf8')).length)")
          echo "Current progress: $INDEX"
          echo "index=$INDEX" >> $GITHUB_OUTPUT

      - name: Trigger workflows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '150' }}
        run: node scrape_batch.js

      - name: Commit and push progress
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('scraped_today.json', 'utf8')).length)")
          TODAY=$(date +%Y-%m-%d)
          CONTENT=$(base64 scraped_today.json)
          LAST_DATE_CONTENT=$(echo -n "$TODAY" | base64)
          SHA=$(gh api repos/sebiboga/scraper_from_anofm/contents/scraped_today.json -q .sha 2>/dev/null || echo "")
          LAST_DATE_SHA=$(gh api repos/sebiboga/scraper_from_anofm/contents/last_date.json -q .sha 2>/dev/null || echo "")
          
          gh api -X PUT repos/sebiboga/scraper_from_anofm/contents/scraped_today.json \
            -f message="Track $COUNT companies for $TODAY" \
            -f content="$CONTENT" \
            -fsha="$SHA" || true
          
          gh api -X PUT repos/sebiboga/scraper_from_anofm/contents/last_date.json \
            -f message="Update last date to $TODAY" \
            -f content="$LAST_DATE_CONTENT" \
            -fsha="$LAST_DATE_SHA" || true
